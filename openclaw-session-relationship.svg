<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 400" font-family="ui-sans-serif, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#e2e8f0"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
    </marker>
  </defs>

  <rect width="700" height="380" fill="url(#bg)" rx="8"/>
  <title>OpenClaw Session Structure</title>

  <!-- sessions.json -->
  <g filter="url(#shadow)">
    <rect x="20" y="20" width="200" height="225" rx="8" fill="#fff" stroke="#94a3b8" stroke-width="1.5"/>
    <text x="120" y="48" font-size="14" font-weight="600" fill="#1e293b" text-anchor="middle">sessions.json</text>
    <text x="120" y="66" font-size="11" fill="#64748b" text-anchor="middle">Session Store</text>
    <line x1="32" y1="80" x2="208" y2="80" stroke="#e2e8f0"/>
    <text x="36" y="98" font-size="12" font-weight="600" fill="#334155">sessionKey</text>
    <text x="36" y="114" font-size="10" fill="#64748b">Format: agent:&#123;agentId&#125;:&#123;scope&#125;</text>
    <text x="36" y="128" font-size="10" fill="#64748b">Meaning: which agent + which conversation</text>
    <line x1="32" y1="138" x2="208" y2="138" stroke="#f1f5f9"/>
    <text x="36" y="156" font-size="10" fill="#334155">agent:main:main</text>
    <text x="36" y="168" font-size="9" fill="#94a3b8">(main DM session)</text>
    <text x="36" y="184" font-size="10" fill="#334155">agent:main:discord:group:xyz</text>
    <text x="36" y="196" font-size="9" fill="#94a3b8">(Discord group chat)</text>
    <text x="36" y="212" font-size="10" fill="#334155">agent:main:subagent:task-1</text>
    <text x="36" y="224" font-size="9" fill="#94a3b8">(subagent session)</text>
    <line x1="32" y1="234" x2="208" y2="234" stroke="#e2e8f0"/>
    <text x="36" y="250" font-size="11" fill="#334155">SessionEntry: sessionId, updatedAt, model...</text>
  </g>

  <!-- sessionId -->
  <g filter="url(#shadow)">
    <rect x="260" y="115" width="130" height="55" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="325" y="142" font-size="13" font-weight="600" fill="#1d4ed8" text-anchor="middle">sessionId</text>
    <text x="325" y="160" font-size="11" fill="#64748b" text-anchor="middle">UUID</text>
  </g>

  <!-- transcript file -->
  <g filter="url(#shadow)">
    <rect x="430" y="20" width="270" height="200" rx="8" fill="#fff" stroke="#22c55e" stroke-width="1.5"/>
    <text x="545" y="48" font-size="14" font-weight="600" fill="#1e293b" text-anchor="middle">sessionId.jsonl</text>
    <text x="545" y="66" font-size="11" fill="#64748b" text-anchor="middle">Transcript File</text>
    <line x1="422" y1="80" x2="668" y2="80" stroke="#e2e8f0"/>
    <text x="426" y="102" font-size="11" fill="#334155">- user messages (role: user)</text>
    <text x="426" y="120" font-size="11" fill="#334155">- assistant replies (role: assistant)</text>
    <text x="426" y="138" font-size="11" fill="#334155">- tool calls / tool results</text>
    <text x="426" y="156" font-size="11" fill="#334155">- metadata (provider, tokens...)</text>
    <line x1="422" y1="174" x2="668" y2="174" stroke="#e2e8f0"/>
    <text x="545" y="196" font-size="12" fill="#059669" text-anchor="middle">Full conversation context</text>
  </g>

  <!-- Arrows -->
  <path d="M200 110 L240 112" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="210" y="95" font-size="10" fill="#64748b">references</text>
  <path d="M370 112 L410 120" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="378" y="105" font-size="10" fill="#64748b">maps to</text>

  <!-- Reset flow -->
  <g filter="url(#shadow)">
    <rect x="20" y="275" width="660" height="120" rx="8" fill="#fefce8" stroke="#eab308" stroke-width="1.5"/>
    <text x="350" y="303" font-size="14" font-weight="600" fill="#854d0e" text-anchor="middle">Session Reset (/new or daily/idle expired)</text>
    <line x1="60" y1="330" x2="640" y2="330" stroke="#94a3b8" stroke-width="2" stroke-dasharray="6 4"/>
    <text x="110" y="360" font-size="11" fill="#059669" text-anchor="middle">old transcript</text>
    <text x="110" y="375" font-size="10" fill="#64748b">archived</text>
    <text x="250" y="360" font-size="11" fill="#dc2626" text-anchor="middle">new sessionId</text>
    <text x="250" y="375" font-size="10" fill="#64748b">generated</text>
    <text x="390" y="360" font-size="11" fill="#dc2626" text-anchor="middle">new transcript</text>
    <text x="390" y="375" font-size="10" fill="#64748b">created</text>
    <text x="530" y="360" font-size="11" fill="#1e40af" text-anchor="middle">strategy preserved</text>
    <text x="530" y="375" font-size="10" fill="#64748b">(thinking/model...)</text>
  </g>
</svg>
