<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 900" font-family="'PingFang SC','Microsoft YaHei','Hiragino Sans GB',sans-serif">
  <defs>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#6c8ebf"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#82b366"/>
    </marker>
    <marker id="arrow-orange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#d79b00"/>
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#b85450"/>
    </marker>

    <style>
      .section { font-size: 16px; font-weight: bold; }
      .h1 { font-size: 13px; font-weight: bold; }
      .h2 { font-size: 12px; font-weight: bold; }
      .body { font-size: 11px; }
      .small { font-size: 10px; }
    </style>
  </defs>

  <rect width="1080" height="900" fill="#ffffff"/>

  <!-- ============ Section labels (no title) ============ -->
  <rect x="40" y="50" width="440" height="30" rx="6" fill="#dae8fc" stroke="#6c8ebf" stroke-width="1.5"/>
  <text x="260" y="71" text-anchor="middle" class="section" fill="#1a3a6c">在线 (Online Serving)</text>

  <rect x="560" y="50" width="460" height="30" rx="6" fill="#d5e8d4" stroke="#82b366" stroke-width="1.5"/>
  <text x="790" y="71" text-anchor="middle" class="section" fill="#2d5e2d">离线 (Offline Training)</text>

  <!-- ============================================================== -->
  <!-- ====================== ONLINE SECTION ======================== -->
  <!-- ============================================================== -->

  <rect x="130" y="100" width="260" height="45" rx="8" fill="#dae8fc" stroke="#6c8ebf" stroke-width="1.5"/>
  <text x="260" y="129" text-anchor="middle" class="h2" fill="#1a3a6c">用户请求 (User Request)</text>

  <rect x="40" y="170" width="440" height="40" rx="8" fill="#dae8fc" stroke="#6c8ebf" stroke-width="1.5"/>
  <text x="260" y="196" text-anchor="middle" class="h1" fill="#1a3a6c">召回 (Recall)</text>

  <rect x="40" y="235" width="440" height="40" rx="8" fill="#dae8fc" stroke="#6c8ebf" stroke-width="1.5"/>
  <text x="260" y="261" text-anchor="middle" class="h1" fill="#1a3a6c">粗排 (Coarse Ranking)</text>

  <!-- 精排 EXPANDED CONTAINER -->
  <rect x="40" y="300" width="440" height="325" rx="12" fill="#f5f9ff" stroke="#6c8ebf" stroke-width="2.2"/>
  <text x="260" y="325" text-anchor="middle" class="h1" fill="#1a3a6c">精排 (Fine Ranking)</text>
  <text x="260" y="343" text-anchor="middle" class="small" fill="#555" font-style="italic">多目标 pXTR 打分</text>

  <!-- 在线 pXTR 特征槽 -->
  <rect x="70" y="360" width="380" height="75" rx="8" fill="#faf5fc" stroke="#9673a6" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="260" y="378" text-anchor="middle" class="small" fill="#4a2d5e" font-style="italic">pXTR 特征槽</text>

  <g>
    <circle cx="103" cy="405" r="18" fill="#ffffff" stroke="#9673a6" stroke-width="1.5"/>
    <text x="103" y="409" text-anchor="middle" class="small" fill="#4a2d5e" font-weight="bold">pCTR</text>
    <circle cx="155" cy="405" r="18" fill="#ffffff" stroke="#9673a6" stroke-width="1.5"/>
    <text x="155" y="409" text-anchor="middle" class="small" fill="#4a2d5e" font-weight="bold">pCVR</text>
    <circle cx="207" cy="405" r="18" fill="#ffffff" stroke="#9673a6" stroke-width="1.5"/>
    <text x="207" y="409" text-anchor="middle" class="small" fill="#4a2d5e" font-weight="bold">pWT</text>
    <circle cx="259" cy="405" r="18" fill="#ffffff" stroke="#9673a6" stroke-width="1.5"/>
    <text x="259" y="409" text-anchor="middle" class="small" fill="#4a2d5e" font-weight="bold">pLike</text>
    <circle cx="311" cy="405" r="18" fill="#ffffff" stroke="#9673a6" stroke-width="1.5"/>
    <text x="311" y="409" text-anchor="middle" class="small" fill="#4a2d5e" font-weight="bold">pFw</text>
    <circle cx="363" cy="405" r="18" fill="#ffffff" stroke="#9673a6" stroke-width="1.5"/>
    <text x="363" y="409" text-anchor="middle" class="small" fill="#4a2d5e" font-weight="bold">pSh</text>
    <circle cx="415" cy="405" r="18" fill="#ffffff" stroke="#9673a6" stroke-width="1.5"/>
    <text x="415" y="409" text-anchor="middle" class="small" fill="#4a2d5e" font-weight="bold">pCm</text>
  </g>

  <line x1="260" y1="435" x2="260" y2="458" stroke="#9673a6" stroke-width="2" marker-end="url(#arrow-red)"/>

  <rect x="80" y="460" width="360" height="55" rx="6" fill="#d5e8d4" stroke="#82b366" stroke-width="1.8"/>
  <text x="260" y="483" text-anchor="middle" class="body" fill="#1d4421" font-weight="bold">Score = w₁·pCTR + w₂·pCVR + w₃·pWT + ...</text>
  <text x="260" y="503" text-anchor="middle" class="small" fill="#1d4421" font-style="italic">多目标加权融合</text>

  <line x1="260" y1="515" x2="260" y2="543" stroke="#6c8ebf" stroke-width="2" marker-end="url(#arrow-blue)"/>

  <rect x="120" y="545" width="280" height="40" rx="6" fill="#dae8fc" stroke="#6c8ebf" stroke-width="1.8"/>
  <text x="260" y="570" text-anchor="middle" class="body" fill="#1a3a6c" font-weight="bold">排序 + 截断 → Top-K₂ 候选</text>

  <line x1="260" y1="585" x2="260" y2="643" stroke="#6c8ebf" stroke-width="2" marker-end="url(#arrow-blue)"/>

  <rect x="130" y="645" width="260" height="40" rx="8" fill="#dae8fc" stroke="#6c8ebf" stroke-width="1.5"/>
  <text x="260" y="670" text-anchor="middle" class="h1" fill="#1a3a6c">重排 (Rerank)</text>

  <rect x="130" y="705" width="260" height="40" rx="8" fill="#dae8fc" stroke="#6c8ebf" stroke-width="1.5"/>
  <text x="260" y="730" text-anchor="middle" class="h1" fill="#1a3a6c">混排 (Mix Ranking)</text>

  <rect x="130" y="765" width="260" height="45" rx="8" fill="#dae8fc" stroke="#6c8ebf" stroke-width="2"/>
  <text x="260" y="794" text-anchor="middle" class="h2" fill="#1a3a6c">返回推荐 List → 用户</text>

  <rect x="130" y="825" width="260" height="60" rx="8" fill="#ffe6cc" stroke="#d79b00" stroke-width="1.5"/>
  <text x="260" y="848" text-anchor="middle" class="h2" fill="#7a4a00">用户行为</text>
  <text x="260" y="868" text-anchor="middle" class="small" fill="#7a4a00">曝光 / 点击 / 完播 / 点赞 / 收藏 / 分享</text>

  <line x1="260" y1="145" x2="260" y2="168" stroke="#6c8ebf" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <line x1="260" y1="210" x2="260" y2="233" stroke="#6c8ebf" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <line x1="260" y1="275" x2="260" y2="298" stroke="#6c8ebf" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <line x1="260" y1="685" x2="260" y2="703" stroke="#6c8ebf" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <line x1="260" y1="745" x2="260" y2="763" stroke="#6c8ebf" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <line x1="260" y1="810" x2="260" y2="823" stroke="#6c8ebf" stroke-width="2" marker-end="url(#arrow-blue)"/>

  <!-- ============================================================== -->
  <!-- ============ OFFLINE SECTION (左移 140px) ===================== -->
  <!-- ============================================================== -->

  <!-- 样本池 (cylinder) -->
  <g>
    <rect x="690" y="115" width="220" height="85" fill="#ffe6cc" stroke="none"/>
    <line x1="690" y1="115" x2="690" y2="200" stroke="#d79b00" stroke-width="1.5"/>
    <line x1="910" y1="115" x2="910" y2="200" stroke="#d79b00" stroke-width="1.5"/>
    <path d="M 690,200 A 110,12 0 0 0 910,200" fill="none" stroke="#d79b00" stroke-width="1.5"/>
    <ellipse cx="800" cy="115" rx="110" ry="12" fill="#ffe6cc" stroke="#d79b00" stroke-width="1.5"/>
  </g>
  <text x="800" y="155" text-anchor="middle" class="h2" fill="#7a4a00">样本池 (Sample Pool)</text>
  <text x="800" y="175" text-anchor="middle" class="small" fill="#7a4a00">曝光 + 行为 Label</text>

  <!-- 4 个模型圆柱 -->
  <g>
    <rect x="588" y="255" width="100" height="85" fill="#d5e8d4" stroke="none"/>
    <line x1="588" y1="255" x2="588" y2="340" stroke="#82b366" stroke-width="1.5"/>
    <line x1="688" y1="255" x2="688" y2="340" stroke="#82b366" stroke-width="1.5"/>
    <path d="M 588,340 A 50,10 0 0 0 688,340" fill="none" stroke="#82b366" stroke-width="1.5"/>
    <ellipse cx="638" cy="255" rx="50" ry="10" fill="#d5e8d4" stroke="#82b366" stroke-width="1.5"/>
  </g>
  <text x="638" y="292" text-anchor="middle" class="h2" fill="#1d4421" font-weight="bold">CTR</text>
  <text x="638" y="313" text-anchor="middle" class="small" fill="#1d4421">模型</text>

  <g>
    <rect x="696" y="255" width="100" height="85" fill="#d5e8d4" stroke="none"/>
    <line x1="696" y1="255" x2="696" y2="340" stroke="#82b366" stroke-width="1.5"/>
    <line x1="796" y1="255" x2="796" y2="340" stroke="#82b366" stroke-width="1.5"/>
    <path d="M 696,340 A 50,10 0 0 0 796,340" fill="none" stroke="#82b366" stroke-width="1.5"/>
    <ellipse cx="746" cy="255" rx="50" ry="10" fill="#d5e8d4" stroke="#82b366" stroke-width="1.5"/>
  </g>
  <text x="746" y="292" text-anchor="middle" class="h2" fill="#1d4421" font-weight="bold">CVR</text>
  <text x="746" y="313" text-anchor="middle" class="small" fill="#1d4421">模型</text>

  <g>
    <rect x="804" y="255" width="100" height="85" fill="#d5e8d4" stroke="none"/>
    <line x1="804" y1="255" x2="804" y2="340" stroke="#82b366" stroke-width="1.5"/>
    <line x1="904" y1="255" x2="904" y2="340" stroke="#82b366" stroke-width="1.5"/>
    <path d="M 804,340 A 50,10 0 0 0 904,340" fill="none" stroke="#82b366" stroke-width="1.5"/>
    <ellipse cx="854" cy="255" rx="50" ry="10" fill="#d5e8d4" stroke="#82b366" stroke-width="1.5"/>
  </g>
  <text x="854" y="292" text-anchor="middle" class="h2" fill="#1d4421" font-weight="bold">完播率</text>
  <text x="854" y="313" text-anchor="middle" class="small" fill="#1d4421">模型</text>

  <g>
    <rect x="912" y="255" width="100" height="85" fill="#d5e8d4" stroke="none"/>
    <line x1="912" y1="255" x2="912" y2="340" stroke="#82b366" stroke-width="1.5"/>
    <line x1="1012" y1="255" x2="1012" y2="340" stroke="#82b366" stroke-width="1.5"/>
    <path d="M 912,340 A 50,10 0 0 0 1012,340" fill="none" stroke="#82b366" stroke-width="1.5"/>
    <ellipse cx="962" cy="255" rx="50" ry="10" fill="#d5e8d4" stroke="#82b366" stroke-width="1.5"/>
  </g>
  <text x="962" y="292" text-anchor="middle" class="h2" fill="#1d4421" font-weight="bold">点赞</text>
  <text x="962" y="313" text-anchor="middle" class="small" fill="#1d4421">模型</text>

  <!-- 样本池 → 4 模型 -->
  <path d="M 730,200 Q 684,227 638,253" fill="none" stroke="#82b366" stroke-width="2" marker-end="url(#arrow-green)"/>
  <path d="M 770,200 Q 758,227 746,253" fill="none" stroke="#82b366" stroke-width="2" marker-end="url(#arrow-green)"/>
  <path d="M 830,200 Q 842,227 854,253" fill="none" stroke="#82b366" stroke-width="2" marker-end="url(#arrow-green)"/>
  <path d="M 870,200 Q 916,227 962,253" fill="none" stroke="#82b366" stroke-width="2" marker-end="url(#arrow-green)"/>

  <!-- 离线 pXTR 输出槽 -->
  <rect x="580" y="385" width="440" height="75" rx="8" fill="#faf5fc" stroke="#9673a6" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="800" y="403" text-anchor="middle" class="small" fill="#4a2d5e" font-style="italic">pXTR 输出</text>

  <circle cx="638" cy="430" r="18" fill="#ffffff" stroke="#9673a6" stroke-width="1.5"/>
  <text x="638" y="434" text-anchor="middle" class="small" fill="#4a2d5e" font-weight="bold">pCTR</text>
  <circle cx="746" cy="430" r="18" fill="#ffffff" stroke="#9673a6" stroke-width="1.5"/>
  <text x="746" y="434" text-anchor="middle" class="small" fill="#4a2d5e" font-weight="bold">pCVR</text>
  <circle cx="854" cy="430" r="18" fill="#ffffff" stroke="#9673a6" stroke-width="1.5"/>
  <text x="854" y="434" text-anchor="middle" class="small" fill="#4a2d5e" font-weight="bold">pWT</text>
  <circle cx="962" cy="430" r="18" fill="#ffffff" stroke="#9673a6" stroke-width="1.5"/>
  <text x="962" y="434" text-anchor="middle" class="small" fill="#4a2d5e" font-weight="bold">pLike</text>

  <!-- 4 模型 → 离线槽 (4 竖线) -->
  <line x1="638" y1="352" x2="638" y2="410" stroke="#82b366" stroke-width="2" marker-end="url(#arrow-green)"/>
  <line x1="746" y1="352" x2="746" y2="410" stroke="#82b366" stroke-width="2" marker-end="url(#arrow-green)"/>
  <line x1="854" y1="352" x2="854" y2="410" stroke="#82b366" stroke-width="2" marker-end="url(#arrow-green)"/>
  <line x1="962" y1="352" x2="962" y2="410" stroke="#82b366" stroke-width="2" marker-end="url(#arrow-green)"/>

  <!-- 离线槽 → 在线槽 (1 根横线) -->
  <line x1="578" y1="422" x2="455" y2="397" stroke="#b85450" stroke-width="2.2" stroke-dasharray="6,4" marker-end="url(#arrow-red)"/>
  <text x="515" y="388" text-anchor="middle" class="small" fill="#b85450" font-weight="bold">pXTR 加载</text>

  <!-- 样本上报 (绕右侧) -->
  <path d="M 390,855 L 1030,855 Q 1050,855 1050,835 L 1050,178 Q 1050,158 1030,158 L 912,158"
        fill="none" stroke="#d79b00" stroke-width="2.2" stroke-dasharray="6,4" marker-end="url(#arrow-orange)"/>
  <text x="700" y="843" text-anchor="middle" class="small" fill="#d79b00" font-weight="bold">样本上报</text>

</svg>