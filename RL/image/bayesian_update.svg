<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 360" font-family="'Noto Sans CJK JP','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <marker id="arrow-gray" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#888"/>
    </marker>
  </defs>
  <rect width="760" height="360" fill="#ffffff"/>

  <!-- 标题 -->
  <text x="380.0" y="30" text-anchor="middle" font-size="15" fill="#222" font-weight="bold">贝叶斯优化: 先验 → 观测 → 后验</text>

  <!-- ============== Panel 1: 先验 ============== -->
  <text x="140.0" y="60" text-anchor="middle" font-size="14" fill="#3a7bd9" font-weight="bold">先验  p(θ)</text>
  <text x="140.0" y="76" text-anchor="middle" font-size="10" fill="#666">N(0, σ=1.5), 均匀信念</text>

  <!-- 面板边框 -->
  <rect x="30" y="70" width="220" height="240" rx="8" fill="#f5f9ff" stroke="#3a7bd9" stroke-width="1.5"/>

  <!-- 基线 -->
  <line x1="50" y1="280" x2="230" y2="280" stroke="#999" stroke-width="1"/>

  <!-- θ=0 标注 -->
  <line x1="140.0" y1="100" x2="140.0" y2="280" stroke="#ccc" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="140.0" y="295" text-anchor="middle" font-size="10" fill="#666">θ=0</text>

  <!-- 先验曲线 -->
