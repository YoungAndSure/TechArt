<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 500" font-family="'PingFang SC','Microsoft YaHei','Hiragino Sans GB',sans-serif">
  <defs>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#6c8ebf"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#82b366"/>
    </marker>
    <marker id="arrow-purple" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#9673a6"/>
    </marker>

    <style>
      .h1 { font-size: 13px; font-weight: bold; }
      .body { font-size: 11px; }
      .small { font-size: 10px; }
    </style>
  </defs>

  <rect width="720" height="500" fill="#ffffff"/>

  <!-- ============ 列头 ============ -->
  <rect x="40" y="40" width="240" height="30" rx="5" fill="#6c8ebf"/>
  <text x="160" y="60" text-anchor="middle" fill="white" class="h1">线上 (Online)</text>

  <rect x="440" y="40" width="240" height="30" rx="5" fill="none" stroke="#82b366" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="560" y="60" text-anchor="middle" fill="#2d5e2d" class="h1">近线回放 (Replay)</text>

  <!-- ============ 左列:线上(实线、正常色) ============ -->

  <!-- 参数 -->
  <rect x="40" y="95" width="240" height="100" rx="8" fill="#dae8fc" stroke="#6c8ebf" stroke-width="1.8"/>
  <text x="160" y="130" text-anchor="middle" class="h1" fill="#1a3a6c">参数</text>
  <text x="160" y="155" text-anchor="middle" class="body" fill="#1a3a6c">w₁, w₂, w₃, ...</text>
  <text x="160" y="178" text-anchor="middle" class="small" fill="#1a3a6c" font-style="italic">线上真实参数</text>

  <!-- 公式 -->
  <rect x="40" y="215" width="240" height="100" rx="8" fill="#d5e8d4" stroke="#82b366" stroke-width="1.8"/>
  <text x="160" y="250" text-anchor="middle" class="h1" fill="#1d4421">公式</text>
  <text x="160" y="275" text-anchor="middle" class="body" fill="#1d4421">Score = wᵢ · pXTRᵢ</text>
  <text x="160" y="298" text-anchor="middle" class="small" fill="#1d4421" font-style="italic">线上执行代码</text>

  <!-- 排序结果 -->
  <rect x="40" y="335" width="240" height="100" rx="8" fill="#e1d5e7" stroke="#9673a6" stroke-width="2.2"/>
  <text x="160" y="370" text-anchor="middle" class="h1" fill="#4a2d5e">排序结果</text>
  <text x="160" y="395" text-anchor="middle" class="body" fill="#4a2d5e">Top-K 候选列表</text>
  <text x="160" y="418" text-anchor="middle" class="small" fill="#4a2d5e" font-style="italic">真实流量产出</text>

  <!-- ============ 右列:近线(虚线、更浅色) ============ -->

  <!-- 参数' -->
  <rect x="440" y="95" width="240" height="100" rx="8" fill="#f5f9ff" stroke="#6c8ebf" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="560" y="130" text-anchor="middle" class="h1" fill="#5d7ba8">参数 (调整)</text>
  <text x="560" y="155" text-anchor="middle" class="body" fill="#5d7ba8">w₁', w₂', w₃', ...</text>
  <text x="560" y="178" text-anchor="middle" class="small" fill="#5d7ba8" font-style="italic">不断尝试新取值</text>

  <!-- 公式' -->
  <rect x="440" y="215" width="240" height="100" rx="8" fill="#f5faf5" stroke="#82b366" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="560" y="250" text-anchor="middle" class="h1" fill="#5a8a5a">公式 (复用)</text>
  <text x="560" y="275" text-anchor="middle" class="body" fill="#5a8a5a">Score = wᵢ · pXTRᵢ</text>
  <text x="560" y="298" text-anchor="middle" class="small" fill="#5a8a5a" font-style="italic">同一段代码原样复用</text>

  <!-- 排序结果' -->
  <rect x="440" y="335" width="240" height="100" rx="8" fill="#faf5fc" stroke="#9673a6" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="560" y="370" text-anchor="middle" class="h1" fill="#7a5d8a">排序结果'</text>
  <text x="560" y="395" text-anchor="middle" class="body" fill="#7a5d8a">Top-K' (参数变化后)</text>
  <text x="560" y="418" text-anchor="middle" class="small" fill="#7a5d8a" font-style="italic">回放产生</text>

  <!-- ============ 中间三个箭头 ============ -->

  <!-- 参数 → 参数': 上报 (蓝,单向) -->
  <line x1="280" y1="145" x2="436" y2="145" stroke="#6c8ebf" stroke-width="2.2" marker-end="url(#arrow-blue)"/>
  <text x="358" y="137" text-anchor="middle" class="small" fill="#6c8ebf" font-weight="bold">上报</text>

  <!-- 公式 → 公式': 复用 (绿,单向) -->
  <line x1="280" y1="265" x2="436" y2="265" stroke="#82b366" stroke-width="2.2" marker-end="url(#arrow-green)"/>
  <text x="358" y="257" text-anchor="middle" class="small" fill="#82b366" font-weight="bold">复用</text>

  <!-- 排序结果 ↔ 排序结果': 比较 (紫,双向) -->
  <line x1="280" y1="385" x2="436" y2="385" stroke="#9673a6" stroke-width="2.2"
        marker-start="url(#arrow-purple)" marker-end="url(#arrow-purple)"/>
  <text x="358" y="377" text-anchor="middle" class="small" fill="#9673a6" font-weight="bold">比较</text>

</svg>